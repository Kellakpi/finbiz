<!DOCTYPE html>
<html>
<head>
    <title>FinBiz</title>
</head>
<body>

<h1>Pending Events</h1>

{% for event in events %}
<div>
    <h3>{{ event.title }}</h3>
    <img src="https://www.eventbrite.com{{ event.image_url }}" width="300">
    <p>{{ event.description }}</p>

    <a href="{{ event.link }}" target="_blank">
        Open Event
    </a>

    <a href="/events/{{ event.id }}/preview">
        Preview Post
    </a>

    <form method="post" action="/events/{{ event.id }}/approve">
        <button type="submit">Approve</button>
    </form>

    <hr>
</div>
{% endfor %}

</body>
</html>
